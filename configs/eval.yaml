# =============================================================================
# DriveSense-VLM Evaluation Configuration
# =============================================================================
# 4-level evaluation framework thresholds, targets, and judge configuration.
# Phase 4b (Full Evaluation) reads from this file.
# Targets represent minimum acceptable performance for deployment readiness.
# =============================================================================

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output_dir: "outputs/eval"
report_format: "json"                 # JSON report; also uploaded to W&B as tables

# -----------------------------------------------------------------------------
# Level 1: Grounding Accuracy
# Measures how well the model localizes hazards with bounding box predictions.
# Evaluated against ground-truth bbox annotations from nuScenes/DADA-2000.
# -----------------------------------------------------------------------------
grounding:
  iou_threshold: 0.5                  # IoU >= 0.5 counts as a true positive
  targets:
    iou_at_50: 0.60                   # TP rate at IoU threshold = 0.5
    hazard_detection_rate: 0.80       # % of GT hazards that have any prediction
    false_positive_rate: 0.15         # % of predictions with no GT match (max)
    mean_iou: 0.55                    # Average IoU across all TP predictions

# -----------------------------------------------------------------------------
# Level 2: Reasoning Quality
# LLM-as-judge evaluation of hazard reasoning, classification, and action advice.
# Uses Anthropic Claude as judge on 5-point Likert scale.
# -----------------------------------------------------------------------------
reasoning:
  judge:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    temperature: 0.1                  # Near-deterministic for reproducible scoring
    dimensions:
      - "correctness"                 # Is the hazard description factually correct?
      - "completeness"                # Are all hazard aspects covered?
      - "action_relevance"            # Is the ego-vehicle action advice appropriate?
    scale: [1, 5]                     # 1 = very poor, 5 = excellent
  targets:
    correctness_score: 3.5            # Mean judge correctness score >= 3.5/5
    completeness_score: 3.0           # Mean judge completeness score >= 3.0/5
    classification_accuracy: 0.75    # Hazard class exact match rate
    severity_spearman: 0.6            # Spearman rank correlation for severity 1–5
    action_relevance_score: 3.5       # Mean judge action relevance score >= 3.5/5

# -----------------------------------------------------------------------------
# Level 3: Production Readiness
# Latency, throughput, and VRAM benchmarks on target hardware.
# Benchmark runs warmup_iterations first, then measures measure_iterations.
# -----------------------------------------------------------------------------
production:
  targets:
    latency_t4_p50_ms: 500            # Median end-to-end latency on T4 GPU (ms)
    latency_a100_p50_ms: 200          # Median end-to-end latency on A100 (ms)
    vit_tensorrt_latency_ms: 25       # ViT TensorRT forward pass latency (ms)
    throughput_a100_fps: 8            # Frames per second throughput on A100
    vram_t4_gb: 6.0                   # Peak VRAM usage on T4 (max 16GB free tier)
    quant_degradation_pct: 2.0        # AWQ vs fp16 quality drop <= 2% on eval set
  benchmark:
    warmup_iterations: 10             # Discard first N iterations (JIT/cache warmup)
    measure_iterations: 100           # Number of timed iterations for statistics

# -----------------------------------------------------------------------------
# Level 4: Robustness
# Performance stratified by driving condition subgroups.
# Ensures the model doesn't catastrophically fail on any operating condition.
# OOD evaluation uses DADA-2000 as out-of-distribution test set.
# -----------------------------------------------------------------------------
robustness:
  stratify_by:
    - "time_of_day"       # day vs night
    - "weather"           # clear vs rain vs fog
    - "location"          # boston vs singapore (nuScenes locations)
    - "ego_speed_bucket"  # 0–20, 20–40, 40+ km/h
  ood_dataset: "dada2000"             # OOD test: evaluate on DADA-2000 exclusively
  targets:
    max_day_night_gap: 0.10           # Max acceptable IoU drop: day vs night
    max_weather_gap: 0.15             # Max acceptable IoU drop: clear vs adverse
    max_location_gap: 0.10            # Max acceptable IoU drop: Boston vs Singapore
    ood_relative_performance: 0.70    # OOD IoU >= 70% of in-distribution IoU
